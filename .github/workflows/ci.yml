name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  build:
    name: Build & test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["18.17", "20", "22"]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      - run: npm run build

  self-lint:
    name: Dogfood isolint
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: isolint lint (SARIF)
        run: node dist/cli/index.js lint README.md --format sarif --fail-on warn > isolint.sarif
        continue-on-error: true

      - name: Upload SARIF to GitHub code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: isolint.sarif
          category: isolint

      - name: isolint lint (enforce)
        run: node dist/cli/index.js lint README.md --fail-on warn

name: Archived release blocker

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  archived:
    runs-on: ubuntu-latest
    steps:
      - name: Stop archived-repo publish
        run: |
          echo "::error::This repository is archived. Publish @razroo/isolint from github.com/razroo/iso packages/isolint instead."
          exit 1
